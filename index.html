<script>
    // 1. Función para cargar componentes
    async function load(id, file) {
        const res = await fetch(`src/components/${file}`);
        const html = await res.text();
        document.getElementById(id).innerHTML = html;

        // Si acabamos de cargar el header, activamos su lógica
        if (id === 'header-comp') {
            initMenu();
        }

        AOS.init({ duration: 1000, once: true });
    }

    // 2. Función con la lógica del menú
    function initMenu() {
        const menuToggle = document.getElementById('menu-toggle');
        const mobileDropdown = document.getElementById('mobile-dropdown');
        const menuPath = document.getElementById('menu-icon-path');
        const body = document.body;

        if (!menuToggle || !mobileDropdown) return;

        menuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = mobileDropdown.classList.contains('hidden');

            if (isHidden) {
                // Abrir Dropdown
                mobileDropdown.classList.remove('hidden');
                menuPath.setAttribute('d', 'M6 18L18 6M6 6l12 12'); // Icono X
                body.style.overflow = 'hidden'; // Opcional: bloquea scroll fondo
            } else {
                // Cerrar Dropdown
                mobileDropdown.classList.add('hidden');
                menuPath.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7'); // Icono Hamburguesa
                body.style.overflow = '';
            }
        });

        // Cerrar al clickear cualquier link del menú móvil
        mobileDropdown.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => {
                mobileDropdown.classList.add('hidden');
                menuPath.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
                body.style.overflow = '';
            });
        });

        // Cerrar si se hace click fuera (en el resto de la página)
        document.addEventListener('click', (e) => {
            if (!mobileDropdown.contains(e.target) && !menuToggle.contains(e.target)) {
                mobileDropdown.classList.add('hidden');
                menuPath.setAttribute('d', 'M4 6h16M4 12h16m-7 6h7');
                body.style.overflow = '';
            }
        });
    }

    // 3. Carga inicial
    window.onload = () => {
        load('header-comp', 'header.html');
        load('hero-comp', 'hero.html');
        load('especialidades-comp', 'especialidades.html');
        load('servicios-comp', 'servicios.html');
        load('trabajos-comp', 'trabajos.html');
        load('contacto-comp', 'contacto.html');
        load('footer-comp', 'footer.html');
    };
</script>
